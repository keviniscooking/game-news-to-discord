name: Game News to Discord

on:
  schedule:
    # Every 30 minutes. GitHub's scheduler is best-effort and can lag a few
    # minutes under load, which is fine for game news.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      seed_only:
        description: "Seed state without posting (marks current items as seen)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: game-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run news sync
        env:
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
          SEED_ONLY: ${{ inputs.seed_only && '1' || '0' }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # add later for Claude curation
        run: dotnet run --project GameNewsToDiscord -c Release

      - name: Commit updated state
        run: |
          git config user.name "game-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/heartbeat.txt
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update news state [skip ci]"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push rejected, rebasing onto latest main (attempt $i)..."
              git fetch origin main
              git rebase origin/main
            done
          fi
